services:
  db:
    image: mysql:8.0
    container_name: amnezia-panel-db
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_DATABASE:-amnezia_panel}
      MYSQL_USER: ${DB_USERNAME:-amnezia}
      MYSQL_PASSWORD: ${DB_PASSWORD:-amnezia}
    ports:
      - "127.0.0.1:3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./migrations:/docker-entrypoint-initdb.d
      - ./my.cnf:/etc/mysql/conf.d/my.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: amnezia-panel-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-local}
      DEFAULT_LOCALE: ${DEFAULT_LOCALE:-en}
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-amnezia_panel}
      DB_USERNAME: ${DB_USERNAME:-amnezia}
      DB_PASSWORD: ${DB_PASSWORD:-amnezia}
    volumes:
      - ./:/var/www/html
    ports:
      - "127.0.0.1:8082:80"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  nginx:
    build:
      context: ./nginx
    container_name: amnezia-panel-nginx
    restart: unless-stopped
    depends_on:
      - web
    env_file:
      - .env
    environment:
      PANEL_DOMAIN: ${PANEL_DOMAIN:-}
      PANEL_IP: ${PANEL_IP:-}
      ACME_EMAIL: ${ACME_EMAIL:-}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
      - selfsigned_certs:/etc/nginx/certs/selfsigned
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  db_data:
  certbot_conf:
  certbot_www:
  selfsigned_certs:
